<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flip the coin</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <b id="heading">
            <h1>Flip the Coin</h1>
        </b>
        <h3>Press the button to flip the coin</h3>
        <img src="image/heads.svg" id="coin">
        <img src="image/shadow.svg" id="shadow">
        <button id="flip-btn">
            Flip Coin
        </button>

        <p class="click">
            <b>Click the button to flip the coin</b>
        </p>

        <audio id="coin-sound">
            <source src="sound/coin.mp3" type="audio/mpeg">
        </audio>

        <script src="script.js"></script>
</body>

</html>
